<!DOCTYPE html>
<html>
<head>
<title>Webtopia Player</title>
<style>
body{margin:0;overflow:hidden;background:#d9d9d9;}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);


// Lighting similar to your image
const light = new THREE.DirectionalLight(0xffffff,1.2);
light.position.set(5,10,5);
scene.add(light);

const blueLight = new THREE.PointLight(0x6d8cff,1,20);
blueLight.position.set(0,3,3);
scene.add(blueLight);

const ambient = new THREE.AmbientLight(0x888888);
scene.add(ambient);


// PLAYER GROUP
const player = new THREE.Group();


// HEAD
const head = new THREE.Mesh(
new THREE.SphereGeometry(1),
new THREE.MeshStandardMaterial({color:0xffffff})
);
head.position.y = 3;
player.add(head);


// BODY
const body = new THREE.Mesh(
new THREE.CylinderGeometry(0.6,0.6,2),
new THREE.MeshStandardMaterial({color:0xffffff})
);
body.position.y = 1.5;
player.add(body);


// LEFT ARM
const armL = new THREE.Mesh(
new THREE.CylinderGeometry(0.2,0.2,2),
new THREE.MeshStandardMaterial({color:0xffffff})
);
armL.rotation.z = Math.PI/4;
armL.position.set(-1,2,0);
player.add(armL);


// RIGHT ARM
const armR = new THREE.Mesh(
new THREE.CylinderGeometry(0.2,0.2,2),
new THREE.MeshStandardMaterial({color:0xffffff})
);
armR.rotation.z = -Math.PI/4;
armR.position.set(1,2,0);
player.add(armR);


// HANDS
const handL = new THREE.Mesh(
new THREE.SphereGeometry(0.4),
new THREE.MeshStandardMaterial({color:0xffffff})
);
handL.position.set(-2,1.3,0);
player.add(handL);

const handR = new THREE.Mesh(
new THREE.SphereGeometry(0.4),
new THREE.MeshStandardMaterial({color:0xffffff})
);
handR.position.set(2,1.3,0);
player.add(handR);


// LEGS
const legL = new THREE.Mesh(
new THREE.CylinderGeometry(0.25,0.25,2),
new THREE.MeshStandardMaterial({color:0xffffff})
);
legL.position.set(-0.4,0,0);
player.add(legL);

const legR = new THREE.Mesh(
new THREE.CylinderGeometry(0.25,0.25,2),
new THREE.MeshStandardMaterial({color:0xffffff})
);
legR.position.set(0.4,0,0);
player.add(legR);


scene.add(player);


// GROUND
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(100,100),
new THREE.MeshStandardMaterial({color:0xaaaaaa})
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -1;
scene.add(ground);


camera.position.set(0,3,8);


// movement
document.addEventListener("keydown",(e)=>{

if(e.key=="w") player.position.z -= 0.2
if(e.key=="s") player.position.z += 0.2
if(e.key=="a") player.position.x -= 0.2
if(e.key=="d") player.position.x += 0.2

});


function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
