<!DOCTYPE html>
<html>
<head>
<title>Webtopia Avatar</title>
<style>
body{margin:0;background:#000;overflow:hidden;}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);


// Lighting (closer to your drawing)
const keyLight = new THREE.DirectionalLight(0xffffff,1);
keyLight.position.set(5,10,5);
scene.add(keyLight);

const blueFill = new THREE.PointLight(0x7aa2ff,1.5,20);
blueFill.position.set(-3,3,3);
scene.add(blueFill);

scene.add(new THREE.AmbientLight(0x404040));


// PLAYER
const player = new THREE.Group();


// HEAD
const head = new THREE.Mesh(
new THREE.SphereGeometry(1,32,32),
new THREE.MeshStandardMaterial({color:0xffffff})
);
head.position.y = 3.8;
player.add(head);


// BODY (thinner)
const body = new THREE.Mesh(
new THREE.CylinderGeometry(0.45,0.45,2.5,32),
new THREE.MeshStandardMaterial({color:0xffffff})
);
body.position.y = 2;
player.add(body);


// ARMS (longer)
const armL = new THREE.Mesh(
new THREE.CylinderGeometry(0.18,0.18,3,16),
new THREE.MeshStandardMaterial({color:0xffffff})
);
armL.rotation.z = Math.PI/3;
armL.position.set(-1.4,2.8,0);
player.add(armL);

const armR = new THREE.Mesh(
new THREE.CylinderGeometry(0.18,0.18,3,16),
new THREE.MeshStandardMaterial({color:0xffffff})
);
armR.rotation.z = -Math.PI/3;
armR.position.set(1.4,2.8,0);
player.add(armR);


// BIG HANDS
const handL = new THREE.Mesh(
new THREE.SphereGeometry(0.45),
new THREE.MeshStandardMaterial({color:0xffffff})
);
handL.position.set(-2.6,2,0);
player.add(handL);

const handR = new THREE.Mesh(
new THREE.SphereGeometry(0.45),
new THREE.MeshStandardMaterial({color:0xffffff})
);
handR.position.set(2.6,2,0);
player.add(handR);


// LONGER LEGS
const legL = new THREE.Mesh(
new THREE.CylinderGeometry(0.25,0.25,3,16),
new THREE.MeshStandardMaterial({color:0xffffff})
);
legL.position.set(-0.35,0.3,0);
player.add(legL);

const legR = new THREE.Mesh(
new THREE.CylinderGeometry(0.25,0.25,3,16),
new THREE.MeshStandardMaterial({color:0xffffff})
);
legR.position.set(0.35,0.3,0);
player.add(legR);


scene.add(player);


// GROUND
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(100,100),
new THREE.MeshStandardMaterial({color:0x777777})
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -1;
scene.add(ground);


camera.position.set(0,4,10);


// movement
document.addEventListener("keydown",(e)=>{
if(e.key=="w") player.position.z -= 0.2
if(e.key=="s") player.position.z += 0.2
if(e.key=="a") player.position.x -= 0.2
if(e.key=="d") player.position.x += 0.2
});


function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
